<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تولید محتوا - منطق پایه دهم</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #f0f4f8;
    color: #1a1a2e;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #006d5b 0%, #00897b 50%, #00acc1 100%);
    color: white;
    padding: 20px 16px 30px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-radius: 0 0 24px 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .back-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    flex-shrink: 0;
  }

  .header-text h2 { font-size: 18px; }
  .header-text p { font-size: 12px; opacity: 0.75; margin-top: 3px; }

  .container {
    padding: 20px 16px;
    max-width: 500px;
    margin: 0 auto;
  }

  .info-box {
    background: #e8fdfd;
    border-right: 4px solid #00acc1;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    line-height: 1.8;
    color: #1a1a2e;
  }

  .section-title {
    font-size: 13px;
    color: #666;
    margin: 0 0 12px;
    padding-right: 8px;
    border-right: 3px solid #00acc1;
  }

  .image-card {
    background: white;
    border-radius: 20px;
    padding: 12px;
    margin-bottom: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  }

  .image-wrapper {
    width: 100%;
    border-radius: 14px;
    overflow: hidden;
    background: #f0f4f8;
    cursor: pointer;
  }

  .image-wrapper img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 14px;
  }

  .image-num {
    text-align: center;
    padding: 10px 0 4px;
    font-size: 12px;
    color: #aaa;
  }

  /* Modal برای نمایش بزرگ */
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .modal.active { display: flex; }

  .modal-close {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal img {
    max-width: 95%;
    max-height: 90vh;
    border-radius: 12px;
    object-fit: contain;
  }

  .spacer { height: 30px; }
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back-btn">›</a>
  <div class="header-text">
    <h2>🎬 تولید محتوا</h2>
    <p>منطق پایه دهم · ۴ تصویر</p>
  </div>
</div>

<div class="container">

  <div class="info-box">
    🎬 برای مشاهده بزرگ‌تر روی هر تصویر کلیک کنید.
  </div>

  <div class="section-title">🖼️ تصاویر آموزشی</div>

  <div class="image-card">
    <div class="image-wrapper" onclick="openModal('files/image-1.jpg')">
      <img src="files/image-1.jpg" alt="تصویر ۱" loading="lazy">
    </div>
    <div class="image-num">تصویر ۱</div>
  </div>

  <div class="image-card">
    <div class="image-wrapper" onclick="openModal('files/image-2.jpg')">
      <img src="files/image-2.jpg" alt="تصویر ۲" loading="lazy">
    </div>
    <div class="image-num">تصویر ۲</div>
  </div>

  <div class="image-card">
    <div class="image-wrapper" onclick="openModal('files/image-3.jpg')">
      <img src="files/image-3.jpg" alt="تصویر ۳" loading="lazy">
    </div>
    <div class="image-num">تصویر ۳</div>
  </div>

  <div class="image-card">
    <div class="image-wrapper" onclick="openModal('files/image-4.jpg')">
      <img src="files/image-4.jpg" alt="تصویر ۴" loading="lazy">
    </div>
    <div class="image-num">تصویر ۴</div>
  </div>

  <div class="spacer"></div>
</div>

<!-- Modal نمایش بزرگ -->
<div class="modal" id="imageModal" onclick="closeModal()">
  <button class="modal-close">✕</button>
  <img id="modalImg" src="" alt="">
</div>

<script>
  function openModal(src) {
    document.getElementById('modalImg').src = src;
    document.getElementById('imageModal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('imageModal').classList.remove('active');
    document.getElementById('modalImg').src = '';
  }
</script>

</body>
</html>
