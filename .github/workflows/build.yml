name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: گرفتن سورس
        uses: actions/checkout@v3

      - name: نصب Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: نصب وابستگی‌ها
        run: npm install

      - name: نصب Capacitor
        run: npm install @capacitor/core @capacitor/cli

      - name: اضافه کردن اندروید
        run: npx cap add android

      - name: کپی فایل‌ها
        run: npx cap copy

      - name: بیلد APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: آپلود APK
        uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
