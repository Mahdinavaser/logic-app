name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Capacitor
        run: npm install

      - name: Copy web files to www
        run: |
          mkdir -p www/files
          cp *.html www/
          cp -r files/. www/files/
          echo "=== www contents ==="
          ls -la www/
          echo "=== www/files contents ==="
          ls -la www/files/

      - name: Init Capacitor
        run: npx cap init "منطق پایه دهم" "com.logic.grade10" --web-dir www

      - name: Add Android Platform
        run: npx cap add android

      - name: Copy Web Assets
        run: npx cap copy android

      - name: Move files to correct location
        run: |
          if [ -d "android/app/src/main/assets/public" ]; then
            echo "Moving from public to assets root..."
            cp -r android/app/src/main/assets/public/. android/app/src/main/assets/
            rm -rf android/app/src/main/assets/public
          fi
          echo "=== Final Android assets ==="
          ls -la android/app/src/main/assets/
          echo "=== Final Android assets/files ==="
          ls -la android/app/src/main/assets/files/

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: logic-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
