name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Capacitor
        run: npm install

      - name: Copy web files to www
        run: |
          mkdir -p www/files
          mkdir -p www/pdfjs
          cp *.html www/
          cp -r files/. www/files/
          cp -r pdfjs/. www/pdfjs/
          mv www/files/Jadval.pdf www/files/jadval.pdf 2>/dev/null || true
      - name: Init and Add Android
        run: |
          npx cap init "منطق پایه دهم" "com.logic.grade10" --web-dir www
          npx cap add android
          npx cap copy android

      - name: Move files if needed
        run: |
          if [ -d "android/app/src/main/assets/public" ]; then
            cp -r android/app/src/main/assets/public/. android/app/src/main/assets/
            rm -rf android/app/src/main/assets/public
          fi

      - name: Patch MainActivity to load from file system
        run: |
          MAIN_ACTIVITY=$(find android -name "MainActivity.java" | head -1)
          echo "Found MainActivity: $MAIN_ACTIVITY"
          cat > $MAIN_ACTIVITY << 'EOF'
          package com.logic.grade10;
          
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import com.getcapacitor.BridgeActivity;
          
          public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              WebView webView = getBridge().getWebView();
              WebSettings settings = webView.getSettings();
              settings.setJavaScriptEnabled(true);
              settings.setDomStorageEnabled(true);
              settings.setAllowFileAccess(true);
              settings.setAllowContentAccess(true);
              settings.setAllowFileAccessFromFileURLs(true);
              settings.setAllowUniversalAccessFromFileURLs(true);
              settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
              webView.setWebViewClient(new WebViewClient());
              webView.loadUrl("file:///android_asset/index.html");
            }
          }
          EOF
          echo "MainActivity patched successfully"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: logic-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
