<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کتاب درسی - منطق پایه دهم</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #f0f4f8;
    color: #1a1a2e;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: white;
    padding: 20px 16px 30px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-radius: 0 0 24px 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .back-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    flex-shrink: 0;
  }

  .header-text h2 { font-size: 18px; }
  .header-text p { font-size: 12px; opacity: 0.75; margin-top: 3px; }

  .container {
    padding: 20px 16px;
    max-width: 500px;
    margin: 0 auto;
  }

  .book-cover {
    background: linear-gradient(135deg, #0f3460, #533483);
    border-radius: 20px;
    padding: 28px 20px;
    margin-bottom: 20px;
    text-align: center;
    color: white;
    box-shadow: 0 8px 25px rgba(15,52,96,0.35);
  }

  .book-cover .cover-icon { font-size: 64px; margin-bottom: 12px; }
  .book-cover h3 { font-size: 20px; margin-bottom: 6px; }
  .book-cover p { font-size: 13px; opacity: 0.8; line-height: 1.7; }

  .cover-tags {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .tag {
    background: rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
  }

  .action-row {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  .action-btn {
    flex: 1;
    padding: 14px 10px;
    border-radius: 14px;
    border: none;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
  }

  .action-btn:active { transform: scale(0.97); }
  .action-btn span:first-child { font-size: 24px; }

  .btn-primary {
    background: linear-gradient(135deg, #0f3460, #533483);
    color: white;
    box-shadow: 0 4px 15px rgba(15,52,96,0.3);
  }

  .btn-secondary {
    background: white;
    color: #0f3460;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  }

  .section-title {
    font-size: 13px;
    color: #666;
    margin: 0 0 12px;
    padding-right: 8px;
    border-right: 3px solid #0f3460;
  }

  .info-card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 14px;
  }

  .info-row:last-child { border-bottom: none; padding-bottom: 0; }
  .info-row:first-child { padding-top: 0; }

  .info-label { color: #888; font-size: 13px; }
  .info-value { font-weight: 600; color: #1a1a2e; }

  .spacer { height: 30px; }
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back-btn">›</a>
  <div class="header-text">
    <h2>📚 کتاب درسی</h2>
    <p>منطق پایه دهم</p>
  </div>
</div>

<div class="container">

  <div class="book-cover">
    <div class="cover-icon">📚</div>
    <h3>منطق</h3>
    <p>کتاب درسی رسمی<br>پایه دهم دبیرستان</p>
    <div class="cover-tags">
      <span class="tag">وزارت آموزش و پرورش</span>
      <span class="tag">پایه دهم</span>
      <span class="tag">۱۰ فصل</span>
    </div>
  </div>

  <div class="action-row">
    <a class="action-btn btn-primary" href="files/ketab.pdf" target="_blank">
      <span>👁️</span>
      <span>مشاهده</span>
    </a>
    <a class="action-btn btn-secondary" href="files/ketab.pdf" download>
      <span>📥</span>
      <span>دانلود</span>
    </a>
  </div>

  <div class="section-title">مشخصات کتاب</div>

  <div class="info-card">
    <div class="info-row">
      <span class="info-label">نام کتاب</span>
      <span class="info-value">منطق</span>
    </div>
    <div class="info-row">
      <span class="info-label">پایه تحصیلی</span>
      <span class="info-value">دهم دبیرستان</span>
    </div>
    <div class="info-row">
      <span class="info-label">تعداد فصل</span>
      <span class="info-value">۱۰ فصل</span>
    </div>
    <div class="info-row">
      <span class="info-label">ناشر</span>
      <span class="info-value">وزارت آموزش و پرورش</span>
    </div>
    <div class="info-row">
      <span class="info-label">فرمت فایل</span>
      <span class="info-value">PDF</span>
    </div>
  </div>

  <div class="spacer"></div>
</div>

</body>
</html>
