<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کتاب درسی - منطق پایه دهم</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: #f0f4f8;
  color: #1a1a2e;
}

.header {
  background: linear-gradient(135deg, #1a1a2e, #0f3460);
  color: white;
  padding: 20px;
  border-radius: 0 0 24px 24px;
}

.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

.book-card {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
}

.action-row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.action-btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  text-align: center;
  font-size: 14px;
}

.btn-primary { background: #0f3460; color: white; }
.btn-secondary { background: #e0e0e0; color: black; }

/* 👇 نمایشگر PDF */
#viewer {
  display: none;
  margin-top: 20px;
}

#pdfFrame {
  width: 100%;
  height: 80vh;
  border-radius: 12px;
  border: none;
}
</style>
</head>

<body>

<div class="header">
  <h2>📚 کتاب‌های منطق</h2>
</div>

<div class="container">

  <!-- کتاب 1 -->
  <div class="book-card">
    <h3>منطق (کتاب رسمی)</h3>

    <div class="action-row">
      <button class="action-btn btn-primary"
        onclick="openPDF('files/ketab-rasmi.pdf')">
        👁️ مشاهده
      </button>

      <a class="action-btn btn-secondary"
        href="files/ketab-rasmi.pdf" download>
        📥 دانلود
      </a>
    </div>
  </div>

  <!-- کتاب 2 -->
  <div class="book-card">
    <h3>منطق - محمودی</h3>

    <div class="action-row">
      <button class="action-btn btn-primary"
        onclick="openPDF('files/ketab-mahmoudi.pdf')">
        👁️ مشاهده
      </button>

      <a class="action-btn btn-secondary"
        href="files/ketab-mahmoudi.pdf" download>
        📥 دانلود
      </a>
    </div>
  </div>

  <!-- 👇 نمایش داخل برنامه -->
  <div id="viewer">
    <button onclick="closePDF()" style="margin-bottom:10px;">❌ بستن</button>
    <iframe id="pdfFrame"></iframe>
  </div>

</div>

<script>
function openPDF(file) {
  document.getElementById("viewer").style.display = "block";
  document.getElementById("pdfFrame").src = file;
}

function closePDF() {
  document.getElementById("viewer").style.display = "none";
  document.getElementById("pdfFrame").src = "";
}
</script>

</body>
</html>
